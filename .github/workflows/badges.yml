name: Update Badges

on:
  # يشتغل فوراً لما حد يحط نجمة
  watch:
    types: [started]
  # يشتغل فوراً لما حد ينزل من الـ release
  release:
    types: [published, released, prereleased]
  # احتياط: كل 10 دقايق
  schedule:
    - cron: '*/10 * * * *'
  # يدوي لو تريد
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate badge SVGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/update_badges.py

      - name: Commit badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/
          if git diff --cached --quiet; then
            echo "No badge changes — skipping commit."
          else
            git commit -m "chore: auto-update badge SVGs [skip ci]"
            git push
          fi
