name: Build & Release APK

on:
  workflow_dispatch:   # يدوي من GitHub
  push:
    branches: [ main ]
    paths:             # يبني فقط لو تغيّر كود التطبيق أو رقم الإصدار
      - 'app/**'
      - 'rust/**'
      - '*.gradle.kts'
      - 'gradle/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust core (optional)
        working-directory: rust
        continue-on-error: true
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          ./build_android.sh || echo "Rust build failed, using OkHttp fallback"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (signed)
        run: ./gradlew assembleRelease

      - name: Extract version info
        id: version
        run: |
          VCODE=$(grep "versionCode" app/build.gradle.kts | head -1 | sed 's/[^0-9]//g')
          VNAME=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT=$(git rev-parse --short HEAD)
          echo "vcode=$VCODE" >> $GITHUB_OUTPUT
          echo "vname=$VNAME" >> $GITHUB_OUTPUT
          echo "commit_short=$SHORT" >> $GITHUB_OUTPUT
          echo "asset=al-hosan-checker-v${VCODE}.apk" >> $GITHUB_OUTPUT
          echo "tag=v${VNAME}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "VerCode=$VCODE VerName=$VNAME Tag=v${VNAME} Asset=al-hosan-checker-v${VCODE}.apk"
          # rename & move APK
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_FILE" "app/build/outputs/apk/release/al-hosan-checker-v${VCODE}.apk"
          jarsigner -verify -verbose -certs "$APK_FILE" 2>&1 | tail -3

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-hosan-checker-release
          path: app/build/outputs/apk/release/*.apk

      - name: Delete previous releases (keep only latest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting all old releases + tags so only the latest remains..."
          gh release list --json tagName,id --repo ${{ github.repository }} | \
            jq -r '.[].tagName' | while read TAG; do
              if [ "$TAG" != "${{ steps.version.outputs.tag }}" ]; then
                echo "  deleting $TAG"
                gh release delete "$TAG" --yes --cleanup-tag --repo ${{ github.repository }} || true
              fi
            done

      - name: Delete same-tag release if exists (to replace with fresh build)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag --repo ${{ github.repository }} || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## AlHosan Checker — ${{ steps.version.outputs.tag }}

            - **Version code:** ${{ steps.version.outputs.vcode }}
            - **Build date:** ${{ steps.version.outputs.date }}
            - **Commit:** `${{ steps.version.outputs.commit_short }}`

            ### التنزيل
            اضغط على ملف **`${{ steps.version.outputs.asset }}`** بالأسفل وحمّله، ثم ثبّته فوق التطبيق القديم.

            ### Download
            Tap **`${{ steps.version.outputs.asset }}`** below to download, then install over the existing app.

            **متطلبات / Requirements:** Android 8.0+ (API 26)
          files: app/build/outputs/apk/release/${{ steps.version.outputs.asset }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
