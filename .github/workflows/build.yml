name: Build & Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust core (optional)
        working-directory: rust
        continue-on-error: true
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973
          ./build_android.sh || echo "Rust build failed, using OkHttp fallback"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (signed)
        run: ./gradlew assembleRelease

      - name: Verify APK is signed
        run: |
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          echo "APK: $APK_FILE"
          
          # Verify signing
          jarsigner -verify -verbose -certs "$APK_FILE" 2>&1 | tail -5
          
          # Rename with clean name
          mv "$APK_FILE" "app/build/outputs/apk/release/al-hosan-checker.apk"
          echo "✅ APK signed and renamed successfully"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-hosan-checker-release
          path: app/build/outputs/apk/release/*.apk

      # ─── Auto Release ──────────────────────────────
      - name: Generate version info
        id: version
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0"
          name: "🐎 الحصان الفاحص v1.0.0"
          body: |
            ## 🐎 الحصان الفاحص - AlHosan Checker

            **الإصدار:** v1.0.0 | **رقم البناء:** #${{ steps.version.outputs.build_number }}
            **تاريخ البناء:** ${{ steps.version.outputs.date }}
            **Commit:** ${{ steps.version.outputs.commit_short }}

            ### التقنولوجيا
            - **UI:** Kotlin + Jetpack Compose (Material3)
            - **Networking:** OkHttp (direct API calls)
            - **Core:** Rust (optional, fallback to OkHttp)

            ### الميزات
            - ✅ فحص اشتراكات Xtream API مباشرة
            - ✅ دعم روابط M3U (استخراج بيانات Xtream)
            - ✅ واجهة عربي/إنجليزي
            - ✅ حفظ السجل والاستعادة
            - ✅ نسخ البيانات وإنشاء رابط M3U
            - ✅ حصان فاحص متحرك 🐎

            ### التعليمات
            1. حمّل ملف APK
            2. فعّل "التثبيت من مصادر غير معروفة" في إعدادات الجهاز
            3. ثبّت التطبيق

            **متطلبات:** Android 8.0+ (API 26)
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
