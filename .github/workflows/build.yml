name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust core
        working-directory: rust
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          ./build_android.sh

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: al-hosan-checker-release
          path: app/build/outputs/apk/release/*.apk

      # ─── Auto Release ────────────────────────────────────────────────
      - name: Generate version info
        id: version
        run: |
          VERSION="v1.0.0-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "🐎 الحصان الفاحص ${{ steps.version.outputs.version }}"
          body: |
            ## 🐎 الحصان الفاحص - AlHosan Checker

            **تاريخ البناء:** ${{ steps.version.outputs.date }}
            **Commit:** ${{ github.sha }}

            ### التكنولوجيا
            - **UI:** Kotlin + Jetpack Compose (Material3)
            - **Core:** Rust (reqwest + rayon + tokio)

            ### التغييرات
            ${{ github.event.head_commit.message }}

            ### التعليمات
            1. حمّل ملف APK
            2. فعّل "التثبيت من مصادر غير معروفة" في إعدادات الجهاز
            3. ثبّت التطبيق

            **متطلبات:** Android 8.0+ (API 26)
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
