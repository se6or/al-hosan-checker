name: al_hosan_checker
description: تطبيق "الحصان الفاحص" لفحص اشتراكات Xtream و M3U بسرعة وسهولة، مع واجهة مستخدم احترافية باللغة العربية.
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  intl: ^0.18.1
  shared_preferences: ^2.2.0
  font_awesome_flutter: 10.5.0
  url_launcher: ^6.1.12
  share_plus: ^7.1.0
  path_provider: ^2.1.1
  flutter_spinkit: ^5.2.0
  provider: ^6.0.5
  screenshot: ^2.1.0
  google_fonts: 5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
